name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.tar.gz
              src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.sig

          - name: macos-x64
            platform: macos-15-intel
            rust_targets: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
            artifact_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.tar.gz
              src-tauri/target/x86_64-apple-darwin/release/bundle/**/*.sig

          - name: windows-x64
            platform: windows-latest
            rust_targets: ''
            args: ''
            artifact_paths: |
              src-tauri/target/release/bundle/**/*.exe
              src-tauri/target/release/bundle/**/*.msi
              src-tauri/target/release/bundle/**/*.zip
              src-tauri/target/release/bundle/**/*.sig

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app - macOS signed
        if: runner.os == 'macOS'
        run: npm run tauri:build -- ${{ matrix.args }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri app - Windows
        if: runner.os == 'Windows'
        run: npm run tauri:build -- ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'PromptClip ${{ github.ref_name }}'
          body: 'See the assets to download this version and install.'
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*
